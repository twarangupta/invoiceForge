services:
  postgres:
    image: postgres:16-alpine
    container_name: invoiceforge-postgres
    restart: always


    environment:
          POSTGRES_USER: ${DB_USER}
          POSTGRES_PASSWORD: ${DB_PASSWORD}
          POSTGRES_DB: ${DB_NAME}
    
    ports:
      - "${DB_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: